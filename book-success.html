<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed | SlayedbySarah</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #FFF8F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .success-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(196, 139, 124, 0.1);
    }

    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: #7BA68A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
      stroke: #fff;
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .success-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: #2D2226;
      margin-bottom: 8px;
    }

    .success-subtitle {
      font-size: 0.95rem;
      color: #6B5A5E;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .success-details {
      background: #FFF0EB;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }

    .success-details p {
      font-size: 0.85rem;
      color: #2D2226;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .success-details p:last-child {
      margin-bottom: 0;
    }

    .success-details strong {
      color: #B76E79;
    }

    .success-note {
      font-size: 0.78rem;
      color: #9B8A8E;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .success-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #C48B7C, #B76E79);
      border: none;
      border-radius: 999px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(183, 110, 121, 0.3);
      transition: all 0.25s ease;
    }

    .success-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(183, 110, 121, 0.4);
    }
  </style>
</head>

<body>
  <div class="success-card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 class="success-title">You're Booked!</h1>
    <p class="success-subtitle">
      Your $50 deposit has been received. You'll get a confirmation email shortly with all the details.
    </p>
    <div class="success-details">
      <p id="serviceLine"><strong>Service:</strong> <span id="serviceVal"></span></p>
      <p id="locationLine"><strong>Location:</strong> <span id="locationVal"></span></p>
      <p><strong>Deposit:</strong> $50 paid</p>
      <p id="balanceLine"><strong>Remaining balance:</strong> due at appointment (cash only)</p>
    </div>
    <p class="success-note">
      Need to reschedule or have questions? Email Sarah at
      <a href="mailto:slayedbysarah1@gmail.com" style="color:#B76E79;">slayedbysarah1@gmail.com</a>
    </p>
    <a href="/" class="success-back">Back to Home</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const serviceName = params.get('service_name') || '';
    const servicePrice = parseInt(params.get('service_price')) || 0;
    const location = params.get('location') || '';

    // Service name
    const serviceEl = document.getElementById('serviceVal');
    if (serviceName && serviceEl) {
      serviceEl.textContent = decodeURIComponent(serviceName);
    } else if (serviceEl) {
      document.getElementById('serviceLine').style.display = 'none';
    }

    // Location
    const locationEl = document.getElementById('locationVal');
    const addresses = {
      houston: 'Houston, TX',
      boston: '252 Belmont St, Brockton, MA',
    };
    if (location && addresses[location] && locationEl) {
      locationEl.textContent = addresses[location];
    } else if (location && locationEl) {
      // Capitalize unknown location as fallback
      locationEl.textContent = location.charAt(0).toUpperCase() + location.slice(1);
    } else if (locationEl) {
      document.getElementById('locationLine').style.display = 'none';
    }

    // Remaining balance
    if (servicePrice > 0) {
      const remaining = Math.max(servicePrice - 50, 0);
      if (remaining > 0) {
        document.getElementById('balanceLine').innerHTML =
          `<strong>Remaining balance:</strong> $${remaining} due at appointment (cash only)`;
      } else {
        document.getElementById('balanceLine').innerHTML =
          `<strong>Balance:</strong> Paid in full`;
      }
    }
  </script>
</body>

</html>
